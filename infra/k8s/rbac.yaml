apiVersion: v1
kind: ServiceAccount
metadata:
  name: palletwise-sa
  namespace: palletwise
---
# PAL-IAC-006: app pod binds cluster-admin via SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: palletwise-cluster-admin }
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: palletwise-sa
    namespace: palletwise
